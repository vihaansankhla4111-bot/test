  <style>
   
    /* ============================
       COMPREHENSIVE FIXES
       ============================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box
    }

    body {
      background: var(--bg-primary);
      margin: 0;
      overflow-x: hidden
    }

    input,
    textarea,
    select {
      box-sizing: border-box;
      font-family: inherit
    }

    html {
      scroll-padding-top: 60px
    }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease
    }

    .loading-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none
    }

    /* Auth Fixes */
    .auth-error {
      display: none
    }

    .auth-error.visible {
      display: block
    }

    .auth-page-full {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      overflow: hidden
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      margin: 20px auto;
      background: rgba(12, 15, 22, 0.92);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 16px;
      padding: 44px 40px;
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.85);
      position: relative;
      z-index: 10;
      animation: authCardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both
    }

    @keyframes authCardIn {
      from {
        opacity: 0;
        transform: translateY(28px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .auth-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
      cursor: pointer
    }

    .auth-logo-dot {
      width: 7px;
      height: 7px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.8), 0 0 30px rgba(0, 112, 243, 0.5)
    }

    .auth-logo-text {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 14px
    }

    .auth-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      text-align: center;
      margin-bottom: 8px
    }

    .auth-subtitle {
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5
    }

    .auth-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 14px 16px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
      display: block
    }

    .auth-input:focus {
      border-color: rgba(0, 112, 243, 0.7);
      background: rgba(0, 112, 243, 0.06);
      box-shadow: 0 0 0 3px rgba(0, 112, 243, 0.12)
    }

    .auth-input::placeholder {
      color: rgba(255, 255, 255, 0.28)
    }

    .auth-form-group {
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    .auth-btn-primary {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: linear-gradient(135deg, #0070f3, #005fd4);
      color: #fff;
      box-shadow: 0 4px 24px rgba(0, 112, 243, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px
    }

    .auth-btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #3291ff, #0070f3);
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(0, 112, 243, 0.45)
    }

    .auth-btn-primary:active {
      transform: translateY(0)
    }

    .auth-btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none
    }

    .auth-btn-social {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px
    }

    .auth-btn-social:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.18)
    }

    .auth-error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      margin-bottom: 16px
    }

    .auth-error-box.show {
      display: block
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.07)
    }

    .auth-divider span {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.28);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      white-space: nowrap
    }

    .auth-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 500;
      letter-spacing: 0.3px
    }

    .auth-footer a {
      color: rgba(255, 255, 255, 0.85);
      font-weight: 700;
      text-decoration: none;
      transition: color 0.2s
    }

    .auth-footer a:hover {
      color: #fff
    }

    .auth-social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    /* Toast System */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      max-width: 380px
    }

    .toast {
      pointer-events: all;
      background: rgba(12, 15, 22, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(24px);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px
    }

    .toast.success {
      border-left: 3px solid #10b981
    }

    .toast.error {
      border-left: 3px solid #ef4444
    }

    .toast.info {
      border-left: 3px solid #0070f3
    }

    .toast.warning {
      border-left: 3px solid #f59e0b
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(110%)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    .toast.fade-out {
      animation: toastOut 0.3s ease forwards
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateX(120%)
      }
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0
    }

    .spinner-sm {
      width: 14px;
      height: 14px;
      border-width: 2px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* Sidebar Mobile */
    .sidebar {
      z-index: 150
    }

    #sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 149;
      display: none;
      backdrop-filter: blur(2px)
    }

    #sidebar-overlay.show {
      display: block
    }

    @media(max-width:768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: fixed;
        height: 100vh
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .content-area {
        padding: 16px !important
      }

      .top-header {
        padding: 0 12px !important
      }
    }

    /* Notification dropdown */
    .notif-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 340px;
      background: rgba(12, 15, 22, 0.99);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(30px);
      z-index: 300;
      overflow: hidden;
      max-height: 480px;
      overflow-y: auto
    }

    .notif-dropdown.hidden {
      display: none
    }

    /* Post card fixes */
    .post-card {
      contain: layout style
    }

    /* Focus states */
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 2px solid rgba(0, 112, 243, 0.6);
      outline-offset: 2px
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.5
      }
    }

    .animate-fadeIn {
      animation: fadeIn 0.4s ease both
    }

    .animate-slideUp {
      animation: authCardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both
    }

    /* Online dot */
    .online-dot {
      width: 8px;
      height: 8px;
      background: var(--success-alt, #10b981);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite
    }

    /* Verified badge */
    .verified {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      font-size: 10px;
      font-weight: bold
    }

    /* Code blocks */
    .code-block {
      background: var(--bg-input);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin: var(--space-3) 0;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      line-height: 1.6;
      color: var(--accent)
    }

    .inline-code {
      background: var(--accent-subtle);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 0.85em
    }

    /* Image preview */
    .image-preview {
      position: relative;
      margin-top: var(--space-3)
    }

    .image-preview img {
      border-radius: var(--radius-lg);
      max-height: 200px
    }

    .image-preview .remove-btn {
      position: absolute;
      top: var(--space-2);
      right: var(--space-2);
      width: 28px;
      height: 28px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: #fff
    }

    /* Page transition animation */
    .page-transition {
      animation: pageIn 0.3s ease both
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* Auth background mesh */
    .auth-bg-mesh {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden
    }

    .auth-bg-mesh::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 112, 243, 0.12) 0%, transparent 70%);
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(80px)
    }

    .auth-bg-mesh::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(121, 40, 202, 0.08) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      filter: blur(60px)
    }

    .auth-grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%)
    }

    /* Interactive BG */
    #interactive-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none
    }

    /* Success colors fix */
    .success-color {
      color: #10b981
    }

    [data-theme="dark"] .online-dot {
      background: #10b981
    }

    /* Modal fix */
    .modal-header {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-secondary)
    }

    .modal-body {
      padding: var(--space-6)
    }

    /* Edit profile modal HTML whitespace bug fix */
    .modal-content-inner>div[class="modal-header"] {
      display: flex
    }
  </style>
</head>

<body>
  <!-- Premium Loading Screen -->
  <section class="loading-screen" id="loading-screen" aria-live="polite">
    <div
      style="position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,#050a1a 0%,#000 70%);pointer-events:none">
    </div>
    <div
      style="position:absolute;inset:0;opacity:0.025;pointer-events:none;background-image:url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.85%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E')">
    </div>

    <div style="position:relative;width:min(700px,90vw);height:180px;margin-bottom:40px">
      <canvas id="initial-wave-canvas" style="width:100%;height:100%;display:block"></canvas>
      <div
        style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#fff;border-radius:50%;box-shadow:0 0 16px rgba(255,255,255,0.8),0 0 40px rgba(0,112,243,0.4);animation:pulse 2s infinite">
      </div>
    </div>

    <div style="text-align:center;position:relative;z-index:10">
      <h1
        style="font-family:'Outfit',sans-serif;font-size:12px;font-weight:800;letter-spacing:6px;text-transform:uppercase;color:#fff;margin-bottom:10px;opacity:0;animation:fadeInUp 0.6s ease 0.2s forwards">
        Initializing Intelligence Layer</h1>
      <p
        style="font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;letter-spacing:3px;color:rgba(255,255,255,0.32);text-transform:uppercase;opacity:0;animation:fadeInUp 0.6s ease 0.4s forwards">
        Analyzing market signals in real time</p>
      <div
        style="margin-top:48px;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;gap:16px;opacity:0;animation:fadeIn 0.8s ease 0.6s forwards">
        <span style="letter-spacing:2px">SYSTEM.TechOL // SIGNAL_UPLINK</span>
        <span style="color:rgba(255,255,255,0.4)"><span id="initial-counter">0</span>%</span>
      </div>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById('initial-wave-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let w, h;
        const resize = () => { const dpr = Math.min(window.devicePixelRatio || 1, 2); w = canvas.clientWidth; h = canvas.clientHeight; canvas.width = w * dpr; canvas.height = h * dpr; ctx.scale(dpr, dpr) };
        window.addEventListener('resize', resize); resize();
        const waves = [
          { amplitude: 26, period: 0.01, phase: 0, speed: 0.015, color: 'rgba(0,112,243,0.5)' },
          { amplitude: 17, period: 0.016, phase: 1, speed: 0.03, color: 'rgba(0,112,243,0.22)' },
          { amplitude: 36, period: 0.008, phase: 2, speed: 0.01, color: 'rgba(80,227,194,0.18)' },
          { amplitude: 12, period: 0.026, phase: 3, speed: 0.05, color: 'rgba(121,40,202,0.12)' }
        ];
        let frame = 0;
        function animate() {
          if (!document.getElementById('initial-wave-canvas')) return;
          ctx.clearRect(0, 0, w, h); frame++;
          waves.forEach((wave, i) => {
            ctx.beginPath(); ctx.lineWidth = i === 0 ? 2 : 1; ctx.strokeStyle = wave.color;
            for (let x = 0; x < w; x++) { const y = h / 2 + Math.sin(x * wave.period + wave.phase) * wave.amplitude * (0.8 + Math.sin(frame * 0.01 + i) * 0.2); x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y) }
            ctx.stroke(); wave.phase -= wave.speed;
          });
          requestAnimationFrame(animate);
        }
        animate();
        let count = 0; const el = document.getElementById('initial-counter');
        const iv = setInterval(() => { if (!el) { clearInterval(iv); return } count += Math.floor(Math.random() * 3) + 1; if (count >= 100) { count = 100; clearInterval(iv) } el.textContent = count }, 35);
      })();
    </script>
  </section>

  <!-- Mobile Sidebar Overlay -->
  <div id="sidebar-overlay" onclick="App&&App.closeSidebar&&App.closeSidebar()"></div>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

 <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- ✅ FIXED: files are in root, not js/ subfolder -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="icons.js"></script>
  <script type="module" src="utils.js"></script>
  <script type="module" src="database.js"></script>
  <script type="module" src="liveNews.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="components.js"></script>
  <script type="module" src="seeder.js"></script>
  <script type="module" src="app.js"></script>

  <script>
    (function () { var t = localStorage.getItem('techol_theme') || 'dark'; document.documentElement.setAttribute('data-theme', t) })();
    window.addEventListener('techol_app_ready', () => {
      const loader = document.getElementById('loading-screen');
      if (loader) { loader.classList.add('fade-out'); setTimeout(() => loader.remove(), 700) }
    });
    setTimeout(() => { const loader = document.getElementById('loading-screen'); if (loader) { loader.classList.add('fade-out'); setTimeout(() => loader.remove(), 700) } }, 6000);
  </script>
</body>
