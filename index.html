  <style>
    /* Code blocks in posts */
    .code-block {
      background: var(--bg-input);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin: var(--space-3) 0;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      line-height: 1.6;
      color: var(--accent);
    }

    .inline-code {
      background: var(--accent-subtle);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 0.85em;
    }

    /* Verified badge */
    .verified {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      font-size: 10px;
      font-weight: bold;
    }

    /* Loading screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      animation: fadeInUp 0.6s ease-out;
    }

    .loading-brand .brand-icon {
      width: 48px;
      height: 48px;
      font-size: 24px;
    }

    .loading-tagline {
      color: var(--text-tertiary);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-8);
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    .loading-bar {
      width: 180px;
      height: 2px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      overflow: hidden;
      animation: fadeIn 0.4s ease-out 0.4s both;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--gradient-accent);
      border-radius: var(--radius-full);
      animation: loadingProgress 1.5s ease-out forwards;
    }

    @keyframes loadingProgress {
      0% {
        width: 0%;
      }

      30% {
        width: 40%;
      }

      60% {
        width: 70%;
      }

      100% {
        width: 100%;
      }
    }

    /* Post image preview */
    .image-preview {
      position: relative;
      margin-top: var(--space-3);
    }

    .image-preview img {
      border-radius: var(--radius-lg);
      max-height: 200px;
    }

    .image-preview .remove-btn {
      position: absolute;
      top: var(--space-2);
      right: var(--space-2);
      width: 28px;
      height: 28px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: #fff;
    }

    /* Online indicator */
    .online-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    /* Company badge */
    .badge-accent {
      animation: none;
    }

    body {
      background: #000;
      margin: 0;
      overflow-x: hidden;
    }

    /* Futuristic Interactive Canvas */
    #interactive-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 1;
      pointer-events: none;
    }

    /* Graph animation for loading screen */
    @keyframes graphRise {
      0% {
        height: 0%;
        opacity: 0;
      }

      100% {
        height: 100%;
        opacity: 1;
      }
    }

    .graph-bar {
      width: 4px;
      background: #fff;
      border-radius: 2px;
      transform-origin: bottom;
      animation: graphRise 1s ease-out forwards;
    }

    .graph-bar:nth-child(1) {
      height: 40%;
      animation-delay: 0.1s;
    }

    .graph-bar:nth-child(2) {
      height: 70%;
      animation-delay: 0.2s;
    }

    .graph-bar:nth-child(3) {
      height: 50%;
      width: 4px;
      animation-delay: 0.3s;
    }

    .graph-bar:nth-child(4) {
      height: 90%;
      animation-delay: 0.4s;
    }

    .graph-bar:nth-child(5) {
      height: 60%;
      animation-delay: 0.5s;
    }
  </style>

<body>
  <!-- Premium Wavy Intelligence Loading Screen -->
  <section class="loading-screen" id="loading-screen" aria-live="polite"
    style="background: radial-gradient(circle at center, #010206 0%, #000 100%);">
    <div
      style="position:absolute; inset:0; opacity:0.03; pointer-events:none; background-image:url('data:image/svg+xml,%3Csvg viewBox=\'0 0 200 200\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.85\' numOctaves=\'3\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E');">
    </div>

    <div style="position:relative; width:100%; max-width:800px; height:240px; margin-bottom:40px;">
      <canvas id="initial-wave-canvas" style="width:100%; height:100%;"></canvas>
      <div
        style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:6px; height:6px; background:#fff; border-radius:50%; box-shadow:0 0 20px #fff; animation: pulse 2s infinite;">
      </div>
    </div>

    <div style="text-align:center; position:relative; z-index:10;">
      <h1
        style="font-family:var(--font-display); font-size:16px; font-weight:800; letter-spacing:6px; text-transform:uppercase; color:#fff; margin-bottom:12px; animation: fadeInUp 0.8s ease-out;">
        Initializing Intelligence Layer</h1>
      <p
        style="font-family:var(--font-display); font-size:11px; font-weight:500; letter-spacing:2px; color:rgba(255,255,255,0.4); text-transform:uppercase; animation: fadeInUp 0.8s ease-out 0.2s both;">
        Analyzing market signals in real time</p>

      <div
        style="margin-top:60px; font-family:var(--font-mono); font-size:11px; color:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; gap:16px; animation: fadeIn 1s ease-out 0.5s both;">
        <span style="letter-spacing:3px;">SYSTEM.TechOL // SIGNAL_UPLINK</span>
        <span style="color:rgba(255,255,255,0.5); width:44px; text-align:right;"><span
            id="initial-counter">0</span>%</span>
      </div>
    </div>

    <div
      style="position:absolute; bottom:60px; width:1px; height:80px; background:linear-gradient(to bottom, rgba(255,255,255,0.1), transparent); animation: fadeIn 2s ease-out 1s both;">
    </div>

    <script>
      (function () {
        const canvas = document.getElementById('initial-wave-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let w, h;
        const resize = () => {
          const dpr = window.devicePixelRatio || 1;
          w = canvas.clientWidth;
          h = canvas.clientHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          ctx.scale(dpr, dpr);
        };
        window.addEventListener('resize', resize);
        resize();

        const waves = [
          { amplitude: 30, period: 0.01, phase: 0, speed: 0.015, color: 'rgba(0, 112, 243, 0.5)' },
          { amplitude: 20, period: 0.015, phase: 0, speed: 0.03, color: 'rgba(0, 112, 243, 0.25)' },
          { amplitude: 40, period: 0.008, phase: 0, speed: 0.01, color: 'rgba(80, 227, 194, 0.2)' },
          { amplitude: 15, period: 0.025, phase: 0, speed: 0.05, color: 'rgba(121, 40, 202, 0.15)' }
        ];

        let frame = 0;
        function animate() {
          if (!document.getElementById('initial-wave-canvas')) return;
          ctx.clearRect(0, 0, w, h);
          frame++;

          waves.forEach((wave, i) => {
            ctx.beginPath();
            ctx.lineWidth = i === 0 ? 2 : 1;
            ctx.strokeStyle = wave.color;
            for (let x = 0; x < w; x++) {
              const y = h / 2 + Math.sin(x * wave.period + wave.phase) * wave.amplitude * (0.8 + Math.sin(frame * 0.01 + i) * 0.2);
              if (x === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.stroke();
            wave.phase -= wave.speed;
          });

          const scanX = (frame * 3) % (w + 400) - 200;
          const grad = ctx.createLinearGradient(scanX - 100, 0, scanX + 100, 0);
          grad.addColorStop(0, 'transparent');
          grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.03)');
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.fillRect(scanX - 100, 0, 200, h);
          requestAnimationFrame(animate);
        }
        animate();

        let count = 0;
        const counterEl = document.getElementById('initial-counter');
        const interval = setInterval(() => {
          if (!counterEl) { clearInterval(interval); return; }
          count += Math.floor(Math.random() * 2) + 1;
          if (count >= 100) { count = 100; clearInterval(interval); }
          counterEl.textContent = count;
        }, 40);
      })();
    </script>
  </section>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Toast Container (global) -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module" src="js/liveNews.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/components.js"></script>
  <script type="module" src="js/seeder.js"></script>
  <script type="module" src="js/debug-firestore.js"></script>
  <script type="module" src="js/app.js"></script>

  <script>
    // Apply saved theme before paint
    (function () {
      var t = localStorage.getItem('techol_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();

    // Remove loading screen after app initializes
    window.addEventListener('techol_app_ready', () => {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(() => loader.remove(), 500);
      }
    });

    // Fallback: remove after 5s if app fails to signal
    setTimeout(() => {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(() => loader.remove(), 500);
      }
    }, 5000);
  </script>
</body>
